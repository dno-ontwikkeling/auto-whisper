name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "plans/**"
      - ".claude/**"

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: main

  build:
    needs: tag
    if: ${{ needs.tag.outputs.new_tag != '' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: |
          dotnet publish src/AutoWhisper/AutoWhisper.csproj `
            --configuration Release `
            --output publish `
            -p:Version=${{ needs.tag.outputs.new_version }}

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ needs.tag.outputs.new_version }} `
            /DOutputFilename=AutoWhisper-${{ needs.tag.outputs.new_version }}-Setup `
            installer.iss
        shell: pwsh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: ${{ needs.tag.outputs.new_tag }}
          body: ${{ needs.tag.outputs.changelog }}
          prerelease: true
          files: installer-output/AutoWhisper-${{ needs.tag.outputs.new_version }}-Setup.exe
